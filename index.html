<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .subject-btn-selected {
            background-color: #4f46e5 !important;
            color: white !important;
            border-color: #4f46e5 !important;
        }
        .target-btn-selected {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        /* タイマー背景のアニメーション */
        @keyframes pulse-soft { 0%, 100% { opacity: 0.05; } 50% { opacity: 0.15; } }
        .animate-pulse-soft { animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="date-setting-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[70] hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-2"><span id="setting-target-name"></span>の日程設定</h3>
            <p class="text-sm text-gray-500 mb-4">試験日を選択してください。</p>
            <input type="date" id="target-date-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-6 outline-none focus:ring-2 focus:ring-emerald-500">
            <div class="flex gap-2">
                <button id="close-date-modal" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-bold">キャンセル</button>
                <button id="save-date-btn" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg font-bold hover:bg-emerald-700">保存する</button>
            </div>
        </div>
    </div>

    <div id="daily-goal-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[70] hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-2">1日の目標時間の設定</h3>
            <p class="text-sm text-gray-500 mb-4">今日の目標勉強時間を入力してください。</p>
            <div class="relative">
                <input type="number" id="daily-goal-input" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-6 outline-none focus:ring-2 focus:ring-indigo-500 text-xl font-bold tabular-nums pr-12" placeholder="3">
                <span class="absolute right-4 top-3.5 text-gray-400 font-bold">時間</span>
            </div>
            <div class="flex gap-2">
                <button id="close-goal-modal" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-bold">キャンセル</button>
                <button id="save-goal-btn" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700">保存する</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        <div id="loading-screen" class="fixed inset-0 bg-white bg-opacity-75 flex items-center justify-center z-50">
            <div class="flex flex-col items-center">
                <svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="mt-4 text-gray-600 font-bold">読み込み中...</p>
            </div>
        </div>

        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-indigo-600 tracking-tight">STUDY TRACKER</h1>
            <div class="bg-indigo-600 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md">
                <span id="points-display">0</span> P
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold text-gray-500">マイダッシュボード</h2>
                <div id="countdown-display" class="mt-1 text-sm font-bold text-emerald-600 italic">
                    目標を選択するとカウントダウンが表示されます
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col justify-center items-center border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Daily Goal Status</p>
                <div id="daily-percentage" class="text-3xl font-black text-indigo-600">0%</div>
            </div>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-700 flex items-center gap-2">
                    📅 今日の進捗 <button id="open-goal-modal" class="text-[10px] bg-gray-50 hover:bg-gray-100 text-gray-500 px-2 py-1 rounded-md border border-gray-200 transition-colors">目標設定</button>
                </h3>
                <div class="text-right">
                    <span id="daily-total-display" class="font-bold text-indigo-600">0時間0分</span>
                    <span class="text-xs text-gray-400"> / <span id="daily-goal-display">--</span>時間</span>
                </div>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-3 mb-1">
                <div id="weekly-progress-bar" class="bg-indigo-600 h-3 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-bold text-gray-400 mb-4 flex items-center gap-2">
                        <span class="w-5 h-5 bg-gray-100 rounded-full flex items-center justify-center text-[10px]">1</span>
                        目標の選択
                    </h3>
                    <div id="target-selection-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-bold text-gray-400 mb-4 flex items-center gap-2">
                        <span class="w-5 h-5 bg-gray-100 rounded-full flex items-center justify-center text-[10px]">2</span>
                        教科の選択
                    </h3>
                    <div id="subject-selection-container" class="grid grid-cols-3 sm:grid-cols-3 gap-3 mb-2"></div>
                    
                    <div id="sub-subject-area" class="mt-4 p-4 bg-indigo-50/50 rounded-xl border border-indigo-100 hidden">
                        <p class="text-[10px] font-bold text-indigo-400 mb-3 uppercase tracking-wider" id="sub-subject-title">詳細科目</p>
                        <div id="sub-subject-container" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-lg flex flex-col items-center justify-center border border-gray-50 relative overflow-hidden min-h-[380px]">
                <div id="timer-bg-pulse" class="absolute inset-0 opacity-0 transition-all duration-500"></div>
                
                <div class="relative z-10 text-center w-full flex flex-col items-center justify-center flex-1">
                    <div class="flex items-center gap-2 mb-3 bg-gray-100/80 px-3 py-1.5 rounded-full border border-gray-200">
                        <input type="checkbox" id="pomodoro-toggle" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked>
                        <label for="pomodoro-toggle" class="text-[11px] font-bold text-gray-600 cursor-pointer select-none">時間制限（ポモドーロ通知）を使う</label>
                    </div>

                    <div id="timer-settings" class="flex justify-center gap-2 mb-4 transition-opacity duration-300">
                        <div class="flex items-center gap-1 bg-indigo-50 px-2 py-1 rounded-md border border-indigo-100">
                            <label class="text-[10px] font-bold text-indigo-400">勉強</label>
                            <input type="number" id="study-time-input" value="25" min="1" max="180" class="w-10 bg-transparent text-center font-bold text-indigo-700 outline-none">
                            <span class="text-[10px] text-indigo-400">分</span>
                        </div>
                        <div class="flex items-center gap-1 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-100">
                            <label class="text-[10px] font-bold text-emerald-500">休憩</label>
                            <input type="number" id="break-time-input" value="5" min="1" max="60" class="w-10 bg-transparent text-center font-bold text-emerald-700 outline-none">
                            <span class="text-[10px] text-emerald-500">分</span>
                        </div>
                    </div>

                    <div id="pomodoro-display" class="mb-1 h-8 flex items-center justify-center">
                        <p class="text-[10px] font-bold text-gray-400 bg-gray-100 py-1 px-4 rounded-full inline-block uppercase tracking-widest">Ready to Start</p>
                    </div>

                    <div id="main-timer-display" class="text-7xl font-black my-2 text-gray-800 tabular-nums tracking-tighter">00:00:00</div>
                    
                    <p id="current-config-display" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-4">教科を選んでください</p>
                </div>

                <div class="relative z-10 w-full space-y-3 mt-4">
                    <button id="start-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 disabled:bg-gray-100 disabled:text-gray-300 disabled:shadow-none transition-all" disabled>学習開始</button>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="pause-btn" class="bg-amber-400 text-white font-bold py-3 rounded-xl hover:bg-amber-500 disabled:bg-gray-50 disabled:text-gray-200" disabled>一時停止</button>
                        <button id="finish-btn" class="bg-rose-500 text-white font-bold py-3 rounded-xl hover:bg-rose-600 disabled:bg-gray-50 disabled:text-gray-200" disabled>完了・保存</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-6 text-gray-700">本日の学習科目</h3>
                <div class="flex flex-col items-center">
                    <div class="w-full max-w-[200px] mb-8">
                        <canvas id="study-chart"></canvas>
                    </div>
                    <div id="study-log-summary" class="w-full space-y-2"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-6 text-gray-700">本日の学習履歴</h3>
                <div id="study-log-list" class="space-y-3 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                    <p class="text-gray-400 italic text-center py-10">データがありません</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'solo-study-hard-resilient';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- DOM Elements ---
        const loadingScreen = document.getElementById('loading-screen');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const finishBtn = document.getElementById('finish-btn');
        const mainTimerDisplay = document.getElementById('main-timer-display');
        const pomodoroDisplay = document.getElementById('pomodoro-display');
        const countdownDisplay = document.getElementById('countdown-display');
        const dateModal = document.getElementById('date-setting-modal');
        const goalModal = document.getElementById('daily-goal-modal');
        const subSubjectArea = document.getElementById('sub-subject-area');
        const subSubjectContainer = document.getElementById('sub-subject-container');
        const studyTimeInput = document.getElementById('study-time-input');
        const breakTimeInput = document.getElementById('break-time-input');
        const timerSettingsDiv = document.getElementById('timer-settings');
        const pomodoroToggle = document.getElementById('pomodoro-toggle');

        // --- Global State ---
        let studentChart = null;
        let targetDates = {}, dailyGoalHours = 3;
        let currentSubject = null, currentTarget = null;

        // Timer State (Resilient Absolute Timeline Method)
        let timerRunning = false;
        let currentPhase = 'IDLE'; // 'IDLE' | 'RUNNING' | 'PAUSED'
        let currentPhaseType = 'STUDY'; // 'STUDY' | 'BREAK'

        let virtualTimelineStart = null; // 仮想タイムラインの開始絶対時刻
        let pausedTimelineSeconds = 0; // 一時停止した時点の累積タイムライン秒数
        let lastReportedPhaseType = 'STUDY'; // 前回のループ処理時のフェーズ

        let sessionTotalStudySeconds = 0; // メインタイマー用（総勉強秒数）
        let phaseRemainingSeconds = 0; // サブタイマー用（現在のフェーズの残り秒数）

        let timerInterval = null;

        const targets = ["中間定期考査", "期末定期考査", "模擬試験", "共通テスト", "英検・検定", "その他"];
        const subjectsData = {
            "国語": null, "数学": null, "英語": null, "理科": ["物理", "化学", "生物", "地学"], "社会": ["地理", "日本史", "世界史", "政経", "倫理"], "情報": null, "その他": null
        };
        const subjectColors = {
            "国語": "#f87171", "数学": "#60a5fa", "英語": "#34d399", "理科": "#fbbf24", "社会": "#fb923c", "情報": "#818cf8", "その他": "#94a3b8",
            "物理": "#fbbf24", "化学": "#f59e0b", "生物": "#d97706", "地学": "#b45309",
            "地理": "#fb923c", "日本史": "#f97316", "世界史": "#ea580c", "政経": "#c2410c", "倫理": "#9a3412"
        };

        // --- LocalStorage State Sync ---
        const LOCAL_STORAGE_KEY = 'study_tracker_backup_state';

        function saveTimerStateToLocalStorage() {
            const state = {
                currentPhase,
                currentPhaseType,
                virtualTimelineStart,
                pausedTimelineSeconds,
                lastReportedPhaseType,
                sessionTotalStudySeconds,
                phaseRemainingSeconds,
                currentTarget,
                currentSubject,
                pomodoroChecked: pomodoroToggle.checked,
                studyTime: studyTimeInput.value,
                breakTime: breakTimeInput.value,
                lastSavedAt: Date.now()
            };
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(state));
        }

        function restoreTimerStateFromLocalStorage() {
            const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (!raw) return;

            try {
                const state = JSON.parse(raw);
                
                // 設定値の復元
                pomodoroToggle.checked = state.pomodoroChecked;
                studyTimeInput.value = state.studyTime;
                breakTimeInput.value = state.breakTime;

                currentTarget = state.currentTarget;
                currentSubject = state.currentSubject;

                // 選択状態のボタン強調
                if (currentTarget) {
                    const targetBtns = document.querySelectorAll('#target-selection-container button');
                    targetBtns.forEach(btn => {
                        if (btn.textContent.trim().startsWith(currentTarget)) {
                            btn.classList.add('target-btn-selected');
                        }
                    });
                }

                if (currentSubject) {
                    let parentMain = null;
                    for (const [main, subs] of Object.entries(subjectsData)) {
                        if (subs && subs.includes(currentSubject)) {
                            parentMain = main; break;
                        } else if (main === currentSubject) {
                            parentMain = main; break;
                        }
                    }

                    if (parentMain) {
                        const mainBtns = document.querySelectorAll('#subject-selection-container button');
                        mainBtns.forEach(btn => {
                            if (btn.textContent.trim() === parentMain) {
                                btn.classList.add('subject-btn-selected');
                            }
                        });

                        if (subjectsData[parentMain]) {
                            renderSubSubjects(parentMain, subjectsData[parentMain]);
                            const subBtns = document.querySelectorAll('#sub-subject-container button');
                            subBtns.forEach(btn => {
                                if (btn.textContent.trim() === currentSubject) {
                                    btn.classList.add('subject-btn-selected');
                                }
                            });
                        }
                    }
                }

                currentPhase = state.currentPhase;
                currentPhaseType = state.currentPhaseType;
                lastReportedPhaseType = state.lastReportedPhaseType;
                pausedTimelineSeconds = state.pausedTimelineSeconds;
                virtualTimelineStart = state.virtualTimelineStart;

                updateSubTimerState();
                checkReady();
                updateCountdown();

                if (currentPhase === 'RUNNING') {
                    timerRunning = true;
                    timerSettingsDiv.style.opacity = "0.3";
                    studyTimeInput.disabled = true;
                    breakTimeInput.disabled = true;
                    pomodoroToggle.disabled = true;

                    startBtn.disabled = true;
                    pauseBtn.disabled = false;
                    finishBtn.disabled = false;
                    
                    setTimeout(() => {
                        document.querySelectorAll('#app button').forEach(b => {
                            if(!b.id.match(/pause|finish|open-goal/)) b.disabled = true;
                        });
                    }, 100);

                    timerTick();
                    timerInterval = setInterval(timerTick, 1000);
                } else if (currentPhase === 'PAUSED') {
                    renderMainTimer(state.sessionTotalStudySeconds);
                    if (pomodoroToggle.checked) {
                        pomodoroDisplay.innerHTML = `<p class="text-sm font-bold text-amber-500 bg-amber-50 py-1 px-6 rounded-full inline-block shadow-sm tracking-widest uppercase">Paused</p>`;
                    }
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                    finishBtn.disabled = false;
                    startBtn.textContent = "再開";
                }
            } catch (err) {
                console.error("Local state restoration failed:", err);
                clearTimerStateFromLocalStorage();
            }
        }

        function clearTimerStateFromLocalStorage() {
            localStorage.removeItem(LOCAL_STORAGE_KEY);
        }

        // --- Init Auth & App ---
        const initAuth = async () => {
            try {
                if (typeof ___initial_auth_token !== 'undefined' && ___initial_auth_token) {
                    await signInWithCustomToken(auth, ___initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth error:", err); }
        };

        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid);
                try {
                    const userDoc = await getDoc(userDocRef);
                    if (!userDoc.exists()) {
                        await setDoc(userDocRef, {
                            points: 0,
                            targetDates: {},
                            dailyGoalHours: 3,
                            totalDuration: 0,
                            updatedAt: serverTimestamp()
                        });
                        targetDates = {};
                        dailyGoalHours = 3;
                    } else {
                        const data = userDoc.data();
                        targetDates = data.targetDates || {};
                        dailyGoalHours = data.dailyGoalHours || 3;
                    }
                    initDashboard(user);
                } catch (err) { console.error(err); }
            }
        });

        const initDashboard = (user) => {
            document.getElementById('daily-goal-display').textContent = dailyGoalHours;
            renderTargets();
            renderMainSubjects();
            setupFirestoreListeners(user);
            phaseRemainingSeconds = parseInt(studyTimeInput.value) * 60;
            updateSubTimerState();

            restoreTimerStateFromLocalStorage();
            loadingScreen.style.display = 'none';
        };

        const setupFirestoreListeners = (user) => {
            if (!user) return;
            onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('points-display').textContent = data.points || 0;
                    targetDates = data.targetDates || {};
                    dailyGoalHours = data.dailyGoalHours || 3;
                    document.getElementById('daily-goal-display').textContent = dailyGoalHours;
                    updateCountdown();
                }
            });

            const logCol = collection(db, 'artifacts', appId, 'public', 'data', 'study_logs');
            onSnapshot(query(logCol, where("userId", "==", user.uid)), (snapshot) => {
                const logs = snapshot.docs.map(d => d.data());
                const today = new Date();
                today.setHours(0,0,0,0);
                const todayLogs = logs.filter(l => l.startTime?.toDate() >= today);
                updateStatsUI(todayLogs, logs);
            });
        };

        // --- Date Config Modal ---
        let activeTargetForDate = "";
        function openDateModal(target) {
            activeTargetForDate = target;
            document.getElementById('setting-target-name').textContent = target;
            document.getElementById('target-date-input').value = targetDates[target] || "";
            dateModal.classList.remove('hidden');
        }

        document.getElementById('close-date-modal').onclick = () => dateModal.classList.add('hidden');

        document.getElementById('save-date-btn').onclick = async () => {
            const dateStr = document.getElementById('target-date-input').value;
            if (!dateStr || !auth.currentUser) return;
            
            targetDates[activeTargetForDate] = dateStr;
            await updateDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid), {
                targetDates: targetDates
            });
            dateModal.classList.add('hidden');
            renderTargets();
            updateCountdown();
        };

        // --- Goal Modal ---
        document.getElementById('open-goal-modal').onclick = () => {
            document.getElementById('daily-goal-input').value = dailyGoalHours;
            goalModal.classList.remove('hidden');
        };
        document.getElementById('close-goal-modal').onclick = () => goalModal.classList.add('hidden');

        document.getElementById('save-goal-btn').onclick = async () => {
            const val = parseInt(document.getElementById('daily-goal-input').value);
            if (isNaN(val) || val <= 0 || !auth.currentUser) return;
            await updateDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid), {
                dailyGoalHours: val
            });
            goalModal.classList.add('hidden');
        };

        // --- Absolute Timeline Timer Logic ---
        studyTimeInput.addEventListener('change', () => {
            if (currentPhase === 'IDLE') {
                phaseRemainingSeconds = parseInt(studyTimeInput.value) * 60;
                updateSubTimerState();
            }
        });

        pomodoroToggle.addEventListener('change', () => {
            updateSubTimerState();
            saveTimerStateToLocalStorage();
        });

        function updateSubTimerState() {
            if (!pomodoroToggle.checked) {
                timerSettingsDiv.style.display = 'none';
                pomodoroDisplay.innerHTML = `<p class="text-[10px] font-bold text-indigo-500 bg-indigo-50 py-1 px-4 rounded-full inline-block uppercase tracking-widest">無制限計測モード</p>`;
            } else {
                timerSettingsDiv.style.display = 'flex';
                if (currentPhase === 'IDLE') {
                    pomodoroDisplay.innerHTML = `<p class="text-[10px] font-bold text-gray-400 bg-gray-100 py-1 px-4 rounded-full inline-block uppercase tracking-widest">Ready to Start</p>`;
                } else if (currentPhase === 'RUNNING') {
                    renderSubTimer(currentPhaseType, phaseRemainingSeconds);
                } else if (currentPhase === 'PAUSED') {
                    pomodoroDisplay.innerHTML = `<p class="text-sm font-bold text-amber-500 bg-amber-50 py-1 px-6 rounded-full inline-block shadow-sm tracking-widest uppercase">Paused</p>`;
                }
            }
        }

        startBtn.onclick = () => {
            if (!currentSubject || !currentTarget) return;

            if (currentPhase === 'IDLE') {
                if ("Notification" in window && Notification.permission === "default" && pomodoroToggle.checked) {
                    Notification.requestPermission();
                }
                currentPhaseType = 'STUDY';
                pausedTimelineSeconds = 0;
                lastReportedPhaseType = 'STUDY';
                sessionTotalStudySeconds = 0;
            }

            timerRunning = true;
            currentPhase = 'RUNNING';
            virtualTimelineStart = Date.now() - (pausedTimelineSeconds * 1000);

            timerSettingsDiv.style.opacity = "0.3";
            studyTimeInput.disabled = true;
            breakTimeInput.disabled = true;
            pomodoroToggle.disabled = true;

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            finishBtn.disabled = false;
            document.querySelectorAll('#app button').forEach(b => {
                if(!b.id.match(/pause|finish|open-goal/)) b.disabled = true;
            });

            timerTick();
            timerInterval = setInterval(timerTick, 1000);
            saveTimerStateToLocalStorage();
        };

        function timerTick() {
            if (!timerRunning) return;

            const elapsedTimelineSeconds = Math.floor((Date.now() - virtualTimelineStart) / 1000);
            sessionTotalStudySeconds = elapsedTimelineSeconds;

            if (pomodoroToggle.checked) {
                const studyPeriod = parseInt(studyTimeInput.value) * 60;
                const breakPeriod = parseInt(breakTimeInput.value) * 60;
                const cycleSeconds = studyPeriod + breakPeriod;

                if (cycleSeconds > 0) {
                    const remainder = elapsedTimelineSeconds % cycleSeconds;
                    let calculatedPhaseType = 'STUDY';
                    let remSec = 0;

                    if (remainder < studyPeriod) {
                        calculatedPhaseType = 'STUDY';
                        remSec = studyPeriod - remainder;
                    } else {
                        calculatedPhaseType = 'BREAK';
                        remSec = cycleSeconds - remainder;
                    }

                    if (calculatedPhaseType !== lastReportedPhaseType) {
                        playNotificationSound();
                        if (calculatedPhaseType === 'BREAK') {
                            notifyUser("📝 勉強時間終了！", "お疲れ様です。休憩時間になりました！");
                        } else {
                            notifyUser("☕ 休憩時間終了！", "勉強時間のサイクルに戻りました。再開しましょう！");
                        }
                        lastReportedPhaseType = calculatedPhaseType;
                    }

                    currentPhaseType = calculatedPhaseType;
                    phaseRemainingSeconds = remSec;

                    renderSubTimer(currentPhaseType, phaseRemainingSeconds);
                }
            } else {
                updateUIForPhase('STUDY_NO_LIMIT');
            }

            renderMainTimer(sessionTotalStudySeconds);
            saveTimerStateToLocalStorage();
        }

        pauseBtn.onclick = () => {
            if (!timerRunning) return;
            clearInterval(timerInterval);
            timerRunning = false;
            pausedTimelineSeconds = Math.floor((Date.now() - virtualTimelineStart) / 1000);

            currentPhase = 'PAUSED';
            if (pomodoroToggle.checked) {
                pomodoroDisplay.innerHTML = `<p class="text-sm font-bold text-amber-500 bg-amber-50 py-1 px-6 rounded-full inline-block shadow-sm tracking-widest uppercase">Paused</p>`;
            }
            document.getElementById('timer-bg-pulse').style.opacity = "0";

            startBtn.disabled = false;
            pauseBtn.disabled = true;
            startBtn.textContent = "再開";

            saveTimerStateToLocalStorage();
        };

        finishBtn.onclick = async () => {
            if (timerRunning) {
                clearInterval(timerInterval);
                timerRunning = false;
                pausedTimelineSeconds = Math.floor((Date.now() - virtualTimelineStart) / 1000);
            }

            if (pausedTimelineSeconds < 1 || !auth.currentUser) {
                resetTimer();
                return;
            }

            const user = auth.currentUser;
            const logCol = collection(db, 'artifacts', appId, 'public', 'data', 'study_logs');
            try {
                await addDoc(logCol, {
                    userId: user.uid,
                    subject: currentSubject,
                    target: currentTarget,
                    duration: pausedTimelineSeconds,
                    startTime: new Date(Date.now() - (pausedTimelineSeconds * 1000)),
                    endTime: new Date()
                });

                const userRef = doc(db, 'artifacts', appId, 'users', user.uid);
                const snap = await getDoc(userRef);
                const currentTotal = (snap.data().totalDuration || 0) + pausedTimelineSeconds;
                await updateDoc(userRef, {
                    totalDuration: currentTotal,
                    points: Math.floor(currentTotal / 60)
                });
            } catch (err) {
                console.error("Save error:", err);
            }

            resetTimer();
        };

        function resetTimer() {
            currentPhase = 'IDLE';
            currentPhaseType = 'STUDY';
            timerRunning = false;
            clearInterval(timerInterval);
            pausedTimelineSeconds = 0;
            sessionTotalStudySeconds = 0;
            lastReportedPhaseType = 'STUDY';

            timerSettingsDiv.style.opacity = "1";
            studyTimeInput.disabled = false;
            breakTimeInput.disabled = false;
            pomodoroToggle.disabled = false;

            phaseRemainingSeconds = parseInt(studyTimeInput.value) * 60;

            renderMainTimer(0);
            updateSubTimerState();

            document.getElementById('timer-bg-pulse').style.opacity = "0";
            document.getElementById('timer-bg-pulse').className = "absolute inset-0 opacity-0 transition-all duration-500";

            startBtn.textContent = "学習開始";
            checkReady();
            clearTimerStateFromLocalStorage();
        }

        // --- UI Rendering Helpers ---
        function renderTargets() {
            const container = document.getElementById('target-selection-container');
            container.innerHTML = "";
            targets.forEach(t => {
                const btn = document.createElement('button');
                btn.className = "flex justify-between items-center px-4 py-3 border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 transition-all text-left bg-white shadow-sm w-full";
                
                const label = document.createElement('span');
                label.textContent = t;
                btn.appendChild(label);

                const rightArea = document.createElement('div');
                rightArea.className = "flex items-center gap-2";

                if (targetDates[t]) {
                    const dSpan = document.createElement('span');
                    dSpan.className = "text-[10px] text-gray-400 font-normal tabular-nums";
                    dSpan.textContent = targetDates[t].slice(5);
                    rightArea.appendChild(dSpan);
                }

                const configBtn = document.createElement('span');
                configBtn.className = "text-xs text-gray-400 hover:text-indigo-600 px-1 cursor-pointer";
                configBtn.innerHTML = "⚙️";
                configBtn.onclick = (e) => {
                    e.stopPropagation();
                    openDateModal(t);
                };
                rightArea.appendChild(configBtn);
                btn.appendChild(rightArea);

                btn.onclick = () => {
                    if (currentPhase !== 'IDLE') return;
                    document.querySelectorAll('#target-selection-container button').forEach(b => b.classList.remove('target-btn-selected'));
                    btn.classList.add('target-btn-selected');
                    currentTarget = t;
                    checkReady();
                    updateCountdown();
                    saveTimerStateToLocalStorage();
                };
                container.appendChild(btn);
            });
        }

        function renderMainSubjects() {
            const container = document.getElementById('subject-selection-container');
            container.innerHTML = "";
            Object.keys(subjectsData).forEach(s => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-3 border border-gray-200 rounded-xl text-xs sm:text-sm font-bold text-gray-600 hover:bg-gray-50 transition-all bg-white shadow-sm text-center";
                btn.textContent = s;
                btn.onclick = () => {
                    if (currentPhase !== 'IDLE') return;
                    document.querySelectorAll('#subject-selection-container button').forEach(b => b.classList.remove('subject-btn-selected'));
                    subSubjectContainer.innerHTML = "";
                    subSubjectArea.classList.add('hidden');

                    btn.classList.add('subject-btn-selected');

                    if (subjectsData[s]) {
                        currentSubject = null;
                        renderSubSubjects(s, subjectsData[s]);
                    } else {
                        currentSubject = s;
                    }
                    checkReady();
                    saveTimerStateToLocalStorage();
                };
                container.appendChild(btn);
            });
        }

        function renderSubSubjects(parent, subs) {
            subSubjectContainer.innerHTML = "";
            document.getElementById('sub-subject-title').textContent = `${parent}の詳細科目`;
            subs.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-2 border border-indigo-200 rounded-lg text-xs font-bold text-indigo-600 hover:bg-indigo-50 transition-all bg-white shadow-sm text-center";
                btn.textContent = sub;
                btn.onclick = () => {
                    if (currentPhase !== 'IDLE') return;
                    document.querySelectorAll('#sub-subject-container button').forEach(b => b.classList.remove('subject-btn-selected'));
                    btn.classList.add('subject-btn-selected');
                    currentSubject = sub;
                    checkReady();
                    saveTimerStateToLocalStorage();
                };
                subSubjectContainer.appendChild(btn);
            });
            subSubjectArea.classList.remove('hidden');
        }

        function checkReady() {
            if (currentPhase !== 'IDLE') return;
            if (currentSubject && currentTarget) {
                startBtn.disabled = false;
                document.getElementById('current-config-display').textContent = `${currentTarget} ＞ ${currentSubject}`;
                document.getElementById('current-config-display').className = "text-[10px] font-bold text-indigo-600 uppercase tracking-widest mt-4";
            } else {
                startBtn.disabled = true;
                let msg = "教科を選んでください";
                if (!currentTarget && currentSubject) msg = "目標を選んでください";
                if (currentTarget && !currentSubject) msg = "教科を選んでください";
                document.getElementById('current-config-display').textContent = msg;
                document.getElementById('current-config-display').className = "text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-4";
            }
        }

        function updateCountdown() {
            if (!currentTarget) {
                countdownDisplay.textContent = "目標を選択するとカウントダウンが表示されます";
                countdownDisplay.className = "mt-1 text-sm font-bold text-gray-400 italic";
                return;
            }
            if (!targetDates[currentTarget]) {
                countdownDisplay.textContent = `⚙️ 右上の設定から「${currentTarget}」の日程を登録してください`;
                countdownDisplay.className = "mt-1 text-sm font-bold text-amber-500 italic";
                return;
            }

            const tDate = new Date(targetDates[currentTarget]);
            tDate.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);

            const diffTime = tDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 0) {
                countdownDisplay.innerHTML = `${currentTarget}まであと <span class="text-2xl font-black text-emerald-600 tabular-nums mx-1">${diffDays}</span> 日`;
                countdownDisplay.className = "mt-1 text-sm font-bold text-gray-700 flex items-center";
            } else if (diffDays === 0) {
                countdownDisplay.textContent = `🎉 今日は ${currentTarget} の当日です！`;
                countdownDisplay.className = "mt-1 text-sm font-bold text-indigo-600 animate-bounce";
            } else {
                countdownDisplay.textContent = `終了したイベント（${currentTarget}）`;
                countdownDisplay.className = "mt-1 text-sm font-bold text-gray-400";
            }
        }

        function renderMainTimer(totalSecs) {
            const hrs = Math.floor(totalSecs / 3600);
            const mins = Math.floor((totalSecs % 3600) / 60);
            const secs = totalSecs % 60;
            mainTimerDisplay.textContent = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }

        function renderSubTimer(phaseType, remainingSecs) {
            const mins = Math.floor(remainingSecs / 60);
            const secs = remainingSecs % 60;
            const timeStr = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

            const bgPulse = document.getElementById('timer-bg-pulse');

            if (phaseType === 'STUDY') {
                pomodoroDisplay.innerHTML = `<p class="text-sm font-bold text-indigo-600 bg-indigo-50 py-1 px-6 rounded-full inline-block shadow-sm tracking-widest tabular-nums">🔥 勉強中: ${timeStr}</p>`;
                bgPulse.className = "absolute inset-0 bg-indigo-500/10 animate-pulse-soft opacity-100";
                mainTimerDisplay.className = "text-7xl font-black my-2 text-indigo-600 tabular-nums tracking-tighter";
            } else {
                pomodoroDisplay.innerHTML = `<p class="text-sm font-bold text-emerald-600 bg-emerald-50 py-1 px-6 rounded-full inline-block shadow-sm tracking-widest tabular-nums">☕ 休憩中: ${timeStr}</p>`;
                bgPulse.className = "absolute inset-0 bg-emerald-500/10 animate-pulse-soft opacity-100";
                mainTimerDisplay.className = "text-7xl font-black my-2 text-emerald-600 tabular-nums tracking-tighter";
            }
        }

        function updateUIForPhase(type) {
            const bgPulse = document.getElementById('timer-bg-pulse');
            if (type === 'STUDY_NO_LIMIT') {
                bgPulse.className = "absolute inset-0 bg-indigo-500/5 animate-pulse-soft opacity-100";
                mainTimerDisplay.className = "text-7xl font-black my-2 text-indigo-600 tabular-nums tracking-tighter";
            }
        }

        function updateStatsUI(todayLogs, allLogs) {
            const subjectTotals = {};
            let todayTotalSec = 0;
            todayLogs.forEach(l => {
                subjectTotals[l.subject] = (subjectTotals[l.subject] || 0) + l.duration;
                todayTotalSec += l.duration;
            });

            const totalHours = todayTotalSec / 3600;
            const hrs = Math.floor(todayTotalSec / 3600);
            const mins = Math.floor((todayTotalSec % 3600) / 60);
            document.getElementById('daily-total-display').textContent = `${hrs}時間${mins}分`;

            const pct = Math.min(100, Math.floor((totalHours / dailyGoalHours) * 100));
            document.getElementById('weekly-progress-bar').style.width = `${pct}%`;
            document.getElementById('daily-percentage').textContent = `${pct}%`;

            const summaryContainer = document.getElementById('study-log-summary');
            summaryContainer.innerHTML = "";
            
            if (Object.keys(subjectTotals).length === 0) {
                summaryContainer.innerHTML = `<p class="text-center text-xs text-gray-400">本日の学習データがまだありません</p>`;
            } else {
                Object.entries(subjectTotals).sort((a,b)=>b[1]-a[1]).forEach(([sub, sec]) => {
                    const h = Math.floor(sec/3600);
                    const m = Math.floor((sec%3600)/60);
                    
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center text-xs p-2 bg-gray-50 rounded-lg";
                    row.innerHTML = `<div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full" style="background-color: ${subjectColors[sub] || '#6366f1'}"></span>
                        <span class="font-bold text-gray-600">${sub}</span>
                    </div>
                    <span class="font-bold text-gray-700 tabular-nums">${h > 0 ? h+'時間' : ''}${m}分</span>`;
                    summaryContainer.appendChild(row);
                });
            }

            const listContainer = document.getElementById('study-log-list');
            listContainer.innerHTML = "";
            const sortedLogs = allLogs.sort((a,b) => b.startTime?.toDate() - a.startTime?.toDate()).slice(0, 10);

            if (sortedLogs.length === 0) {
                listContainer.innerHTML = `<p class="text-gray-400 italic text-center py-10">データがありません</p>`;
            } else {
                sortedLogs.forEach(l => {
                    const date = l.startTime?.toDate();
                    const dateStr = date ? `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}` : '--';
                    const m = Math.floor(l.duration / 60);
                    const s = l.duration % 60;

                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center p-3 bg-gray-50/50 border border-gray-100 rounded-xl text-xs";
                    item.innerHTML = `<div>
                        <div class="flex items-center gap-1.5 font-bold text-gray-700 mb-0.5">
                            <span class="w-1.5 h-1.5 rounded-full" style="background-color: ${subjectColors[l.subject] || '#6366f1'}"></span>
                            <span>${l.subject}</span>
                            <span class="text-[10px] text-gray-400 font-normal">(${l.target})</span>
                        </div>
                        <div class="text-[10px] text-gray-400 tabular-nums">${dateStr}</div>
                    </div>
                    <div class="font-bold text-gray-600 tabular-nums bg-white px-2 py-1 rounded-md border border-gray-100 shadow-sm">${m > 0 ? m+'分' : ''}${s}秒</div>`;
                    listContainer.appendChild(item);
                });
            }

            renderChart(subjectTotals);
        }

        function renderChart(totals) {
            const ctx = document.getElementById('study-chart').getContext('2d');
            const labels = Object.keys(totals);
            const data = Object.values(totals).map(v => Math.floor(v/60));
            const colors = labels.map(l => subjectColors[l] || '#6366f1');

            if (studentChart) {
                studentChart.destroy();
            }

            if (labels.length === 0) {
                ctx.clearRect(0, 0, 200, 200);
                return;
            }

            studentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.raw}分` } } },
                    cutout: '75%'
                }
            });
        }

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                oscillator.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.15); // A5

                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            } catch (e) { console.error("Audio error:", e); }
        }

        function notifyUser(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: body });
            }
        }
    </script>
</body>
</html>
